name: Precover Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  precover-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish to Maven Local
        run: ./gradlew :core:publishToMavenLocal :rules:publishToMavenLocal :ksp:publishToMavenLocal :gradle-plugin:publishToMavenLocal -Pprecover.enabled=false --no-daemon

      - name: Run Aggregate Precover Check and Report
        run: ./gradlew precoverAggregateReport precoverAggregateCheck --no-daemon

      - name: List Precover HTML Reports
        run: find . -name "*report.html"
