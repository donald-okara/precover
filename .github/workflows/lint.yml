name: Lint Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Calculate Version
        id: get_version
        run: |
          VERSION=$(git describe --tags --always --dirty | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to Maven Local
        env:
          PRECOVER_LOCAL_DEV: true
        run: ./gradlew :core:publishToMavenLocal :rules:publishToMavenLocal :ksp:publishToMavenLocal :gradle-plugin:publishToMavenLocal -Pprecover.enabled=false -Pprecover.version=${{ steps.get_version.outputs.version }} --no-daemon --no-configuration-cache

      - name: Build and Test
        env:
          PRECOVER_LOCAL_DEV: true
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
        run: ./gradlew spotlessCheck build -Pprecover.enabled=false -Pprecover.version=${{ steps.get_version.outputs.version }} --no-daemon --no-configuration-cache

      - name: Run Precover Report
        env:
          PRECOVER_LOCAL_DEV: true
        run: ./gradlew :app:precoverReport -Pprecover.version=${{ steps.get_version.outputs.version }} --no-daemon --no-configuration-cache
